services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: telpark
      POSTGRES_PASSWORD: telpark
      POSTGRES_DB: telpark
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U telpark']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://telpark:telpark@postgres:5432/telpark
      PORT: 5000
    ports:
      - '5000:5000'
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: http://backend:5000
    environment:
      API_URL: http://backend:5000
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
